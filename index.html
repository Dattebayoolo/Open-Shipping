<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Shipping — Logistics Dashboard</title>
  <meta name="description" content="Real-time shipping operations dashboard for logistics teams. Track shipments, fleet, ports, and alerts in one place." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 20h20M4 20V10l8-6 8 6v10"/>
            <path d="M9 20v-5h6v5"/>
          </svg>
          <span class="logo-text">OpenShipping</span>
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="user-avatar">KM</div>
        <div class="user-info">
          <span class="user-name">Kaza Mahmood</span>
          <span class="user-role">Logistics Admin</span>
        </div>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar" id="topbar"></header>
      <main class="content" id="page-content">
        <div class="page-loader">
          <div class="loader-spinner"></div>
        </div>
      </main>
    </div>
  </div>

  <div id="sidebar-overlay" class="modal-overlay hidden" style="z-index:190"></div>
  <div id="modal-overlay" class="modal-overlay hidden"></div>
  <div id="modal-container" class="modal-container hidden"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
